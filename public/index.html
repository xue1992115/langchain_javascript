<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>低空经济知识助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 800px;
      height: 100vh;
      max-height: 800px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 20px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      margin: 20px;
    }
    .header {
      padding: 18px 24px;
      border-bottom: 1px solid #e8eaed;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
    }
    .header .subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .btn-new {
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-new:hover {
      background: #f5f5f5;
      border-color: #ccc;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .messages:empty::after {
      content: "输入问题开始对话";
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #bbb;
      font-size: 15px;
    }
    .msg {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg.assistant { align-self: flex-start; }
    .msg .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .msg.user .avatar {
      background: #1a73e8;
      color: #fff;
    }
    .msg.assistant .avatar {
      background: #34a853;
      color: #fff;
    }
    .msg .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: #f0f2f5;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }
    .msg.system-status {
      align-self: center;
      max-width: 100%;
    }
    .msg.system-status .bubble {
      background: #fffbe6;
      border: 1px solid #ffe58f;
      color: #ad8b00;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
    }
    .msg.system-status.status-error .bubble {
      background: #fff2f0;
      border-color: #ffccc7;
      color: #cf1322;
    }
    .msg.system-status.status-info .bubble {
      background: #e6f7ff;
      border-color: #91d5ff;
      color: #096dd9;
    }
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,.06);
    }
    .source-tag {
      font-size: 11px;
      background: #e6f7ff;
      color: #096dd9;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #91d5ff;
    }
    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 16px;
      background: #1a73e8;
      margin-left: 2px;
      animation: blink .8s step-end infinite;
      vertical-align: middle;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid #e8eaed;
      display: flex;
      gap: 10px;
    }
    .input-area textarea {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color .2s;
      line-height: 1.5;
      min-height: 44px;
      max-height: 120px;
    }
    .input-area textarea:focus {
      border-color: #1a73e8;
    }
    .input-area textarea:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }
    .btn-send {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: #1a73e8;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: all .2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-send:hover:not(:disabled) {
      background: #1557b0;
    }
    .btn-send:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .btn-send.loading {
      animation: pulse 1.2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>低空经济知识助手</h1>
      <div class="subtitle">基于 RAG + 大模型</div>
    </div>
    <div class="header-actions">
      <button class="btn-new" onclick="newChat()">新对话</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea
      id="input"
      rows="1"
      placeholder="请输入问题..."
      onkeydown="handleKey(event)"
    ></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'rag_chat_messages';
  let messages = [];       // 对话历史 [{ role, content }]
  let isStreaming = false; // 是否正在接收流
  let abortController = null; // 用于中断请求

  // ======================== 初始化 ========================

  function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try { messages = JSON.parse(saved); } catch(e) { messages = []; }
    }
    renderAll();
    scrollBottom();
  }

  // ======================== 消息存储 ========================

  function saveMessages() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
  }

  function addMessage(role, content) {
    messages.push({ role, content });
    saveMessages();
  }

  // ======================== 渲染 ========================

  function renderAll() {
    const el = document.getElementById('messages');
    el.innerHTML = '';
    for (const msg of messages) {
      appendMessageDOM(msg.role, msg.content, false);
    }
    scrollBottom();
  }

  function appendMessageDOM(role, content, isPartial = false) {
    const el = document.getElementById('messages');
    if(!content) return;
    if (role === 'status') {
      const div = document.createElement('div');
      div.className = `msg system-status status-${content.type || 'info'}`;
      div.innerHTML = `<div class="bubble">${content.message || content}</div>`;
      el.appendChild(div);
      scrollBottom();
      return div;
    }

    // 移除流式占位（如果存在）
    const last = el.lastElementChild;
    if (isPartial && last && last.dataset.role === 'assistant' && last.dataset.streaming === 'true') {
      // 更新已有的流式消息
      const bubble = last.querySelector('.bubble-content');
      if (bubble) {
        bubble.textContent = content;
      }
      scrollBottom();
      return last;
    }

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.dataset.role = role;
    if (isPartial) div.dataset.streaming = 'true';

    const avatar = role === 'user' ? '👤' : '🤖';
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">
        <div class="bubble-content">${escapeHtml(content)}</div>
      </div>
    `;
    el.appendChild(div);
    scrollBottom();
    return div;
  }

  function appendSources(sources) {
    if (!sources || sources.length === 0) return;
    const el = document.getElementById('messages');
    const lastAssistant = el.querySelector('.msg.assistant:last-of-type');
    if (!lastAssistant) return;
    const bubble = lastAssistant.querySelector('.bubble');
    if (!bubble) return;
    const srcDiv = document.createElement('div');
    srcDiv.className = 'sources';
    srcDiv.innerHTML = sources.map(s => `<span class="source-tag">📄 ${escapeHtml(s)}</span>`).join('');
    bubble.appendChild(srcDiv);
  }

  function removeAllStatusMessages() {
    const el = document.getElementById('messages');
    el.querySelectorAll('.msg.system-status').forEach(s => s.remove());
  }

  function removeEmptyAssistantPlaceholder() {
    const el = document.getElementById('messages');
    const last = el.lastElementChild;
    if (last && last.dataset.role === 'assistant') {
      const bubble = last.querySelector('.bubble-content');
      if (bubble && !bubble.textContent.trim()) {
        last.remove();
      }
    }
  }

  function scrollBottom() {
    const el = document.getElementById('messages');
    setTimeout(() => { el.scrollTop = el.scrollHeight; }, 10);
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  // ======================== 输入 ========================

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ======================== 发送消息（SSE 流式） ========================

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text || isStreaming) return;

    input.value = '';
    input.style.height = 'auto';
    input.disabled = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('sendBtn').classList.add('loading');
    isStreaming = true;

    // 1. 添加用户消息到界面和历史
    addMessage('user', text);
    appendMessageDOM('user', text);

    // 2. 创建助手消息占位（流式输出容器）
    appendMessageDOM('assistant', '', true);

    // 3. 发送 SSE 请求
    abortController = new AbortController();

    let fullReply = '';
    let sourcesData = null;

    try {
      const response = await fetch('/api/rag/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
        signal: abortController.signal, // 请求中断，abortController用于主动取消网络请求，业务场景：用户点击「停止生成」，立刻终止后端 SSE 推送，节省 Token 消耗。
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      // 流式二进制读取
      // 1、创建读取器
      const reader = response.body.getReader();
      // 2、二进制 Uint8Array → UTF-8 字符串解码器
      const decoder = new TextDecoder();
      let buffer = '';
      let currentEvent = '';
      let currentData = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        // 逐行解析 SSE
        const lines = buffer.split('\n');
        buffer = lines.pop() || ''; // 保留不完整行

        for (const line of lines) {
          if (line.startsWith('event: ')) {
            currentEvent = line.slice(7).trim();
          } else if (line.startsWith('data: ')) {
            currentData = line.slice(6);
          } else if (line === '' && currentEvent) {
            // 空行 = 事件分隔符
            handleSSEEvent(currentEvent, currentData);
            currentEvent = '';
            currentData = '';
          }
        }
      }
    } catch (err) {
      if (err.name === 'AbortError') {
        // 用户中断，不处理
      } else {
        appendMessageDOM('status', { type: 'error', message: `请求失败: ${err.message}` });
      }
    } finally {
      isStreaming = false;
      input.disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('sendBtn').classList.remove('loading');
      abortController = null;
      input.focus();

      // 清除所有状态提示（正在检索/正在生成等）
      removeAllStatusMessages();

      if (fullReply) {
        // 保存完整回复到历史
        addMessage('assistant', fullReply);
        // 移除流式标记
        const lastAsst = document.querySelector('#messages .msg.assistant:last-of-type');
        if (lastAsst) {
          delete lastAsst.dataset.streaming;
        }
      } else {
        // 没有获取到有效回复，移除空的助手消息占位
        removeEmptyAssistantPlaceholder();
      }

      scrollBottom();
    }

    // SSE 事件处理
    function handleSSEEvent(event, rawData) {
      let data;
      try { data = JSON.parse(rawData); } catch(e) { data = rawData; }

      switch (event) {
        case 'status':
          appendMessageDOM('status', data);
          removePreviousStatus();
          scrollBottom();
          break;

        case 'sources':
          sourcesData = data;
          break;

        case 'token':
          if (data && data.token) {
            fullReply += data.token;
            appendMessageDOM('assistant', fullReply, true);
          }
          break;

        case 'done':
          // 完成后显示来源
          if (sourcesData && sourcesData.length > 0) {
            setTimeout(() => appendSources(sourcesData), 50);
          }
          break;

        case 'error':
          appendMessageDOM('status', { type: 'error', message: data.message || '未知错误' });
          break;
      }
    }

    function removePreviousStatus() {
      const el = document.getElementById('messages');
      const allStatus = el.querySelectorAll('.msg.system-status');
      if (allStatus.length > 1) {
        allStatus[allStatus.length - 2].remove();
      }
    }
  }

  // ======================== 新对话 ========================

  function newChat() {
    if (isStreaming && abortController) {
      abortController.abort();
      isStreaming = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('sendBtn').classList.remove('loading');
      document.getElementById('input').disabled = false;
    }
    messages = [];
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('messages').innerHTML = '';
    document.getElementById('input').value = '';
    document.getElementById('input').focus();
    scrollBottom();
  }

  // ======================== 自动调整输入框高度 ========================

  document.getElementById('input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // 启动
  init();
</script>
</body>
</html>
